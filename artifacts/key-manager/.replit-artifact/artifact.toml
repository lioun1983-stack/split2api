kind = "web"
previewPath = "/"
title = "API Key Manager"
version = "1.0.0"
id = "artifacts/key-manager"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19243

[services.development]
run = "pnpm --filter @workspace/key-manager run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/key-manager", "run", "build" ]
publicDir = "artifacts/key-manager/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19243"
BASE_PATH = "/"
